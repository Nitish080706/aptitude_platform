<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Sophía Study</title>
  <meta name="description" content="Administrator login for Sophía Study." />
  <link rel="stylesheet" href="/css/sophia.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    body {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .auth-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 4rem;
      position: relative;
    }
    .auth-back { position: absolute; top:2rem; left:2rem; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); text-decoration:none; }
    .auth-back:hover { color:var(--text); }
    .auth-topbar { position:absolute; top:2rem; right:2rem; }
    .admin-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.75rem;
      border: 2px solid var(--primary-yellow);
      color: var(--primary-yellow);
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
    }
    .auth-header h1 { font-size: 2.2rem; text-transform:uppercase; }
    .auth-header p  { color:var(--text-muted); margin-top:0.4rem; font-size:0.9rem; }
    .auth-form { display:flex; flex-direction:column; gap:1.25rem; max-width:400px; }
    .auth-footer { margin-top:1.5rem; font-size:0.875rem; color:var(--text-muted); }
    .auth-footer a { color:var(--primary-yellow); font-weight:600; }
    .auth-art { background-color:#111; position:relative; overflow:hidden; }
    .auth-quote { position:absolute; bottom:3rem; left:2rem; right:2rem; z-index:2; }
    .auth-quote blockquote { font-family:'Archivo Black',sans-serif; font-size:1.4rem; color:var(--primary-yellow); line-height:1.2; text-transform:uppercase; }
    .auth-quote cite { display:block; margin-top:0.5rem; font-size:0.75rem; color:rgba(255,255,255,0.4); font-style:normal; text-transform:uppercase; letter-spacing:0.1em; }
    @media (max-width:800px) { body{grid-template-columns:1fr;} .auth-art{display:none;} .auth-panel{padding:5rem 1.5rem 2rem;} }
  </style>
</head>
<body>

  <div class="auth-panel">
    <a href="/index.html" class="auth-back">← Home</a>
    <div class="auth-topbar">
      <button class="theme-toggle" aria-label="Toggle theme">☀️</button>
    </div>

    <div class="auth-header" style="margin-bottom:2rem;">
      <div class="admin-tag">
        <span class="icon-square" style="width:8px;height:8px;background:var(--primary-yellow);display:inline-block;"></span>
        Admin Access
      </div>
      <h1>Admin Login</h1>
      <p>Restricted area. Authorized administrators only.</p>
    </div>

    <div id="auth-error" class="alert alert-error" style="display:none;"></div>

    <form class="auth-form" id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="admin@example.com"
               autocomplete="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••"
               autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-full" id="btn-submit">
        Login as Admin
      </button>
    </form>

    <p class="auth-footer">
      Need admin access? <a href="/admin/signup.html">Register with key →</a>
    </p>
    <p class="auth-footer" style="margin-top:0.5rem;">
      <a href="/login.html" style="color:var(--text-muted);font-size:0.8rem;">← User login</a>
    </p>
  </div>

  <div class="auth-art" aria-hidden="true">
    <svg viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;position:absolute;inset:0">
      <rect width="500" height="600" fill="#111"/>
      <rect x="50" y="50"  width="160" height="160" fill="var(--primary-yellow)" opacity="0.9"/>
      <rect x="290" y="50" width="160" height="160" fill="var(--primary-blue)" opacity="0.8"/>
      <rect x="50" y="390" width="160" height="160" fill="var(--primary-blue)" opacity="0.8"/>
      <rect x="290" y="390" width="160" height="160" fill="var(--primary-red)" opacity="0.8"/>
      <circle cx="250" cy="300" r="80" fill="var(--primary-yellow)" opacity="0.15"/>
      <rect x="246" y="0" width="4" height="600" fill="var(--primary-yellow)" opacity="0.4"/>
      <rect x="0" y="296" width="500" height="4" fill="var(--primary-yellow)" opacity="0.4"/>
    </svg>
    <div class="auth-quote">
      <blockquote>"Art and technology — a new unity."</blockquote>
      <cite>— Walter Gropius, Sophía Manifesto</cite>
    </div>
  </div>

  <script type="module">
    import { initTheme } from '/js/theme.js';
    import { signIn, getCachedProfile, setCachedProfile, onAuth } from '/js/auth.js';
    import { api } from '/js/api.js';

    initTheme();

    onAuth(async (user) => {
      if (!user) return;
      let p = getCachedProfile();
      // Clear stale cache from a different account
      if (p && p.uid !== user.uid) {
        localStorage.removeItem('userProfile');
        p = null;
      }
      if (!p) return; // no valid cache, stay on admin login page
      if (p.role === 'admin') window.location.href = '/admin/dashboard.html';
    });

    const form   = document.getElementById('login-form');
    const errBox = document.getElementById('auth-error');
    const btnSub = document.getElementById('btn-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.style.display = 'none';
      btnSub.disabled = true;
      btnSub.textContent = 'Verifying…';

      try {
        // Clear stale cache before signing in as a new account
        localStorage.removeItem('userProfile');
        await signIn(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        const profile = await api.get('/auth/me');
        if (profile.role !== 'admin') {
          throw new Error('This account does not have admin privileges.');
        }
        setCachedProfile(profile);
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        errBox.textContent = err.message || 'Login failed.';
        errBox.style.display = 'block';
        btnSub.disabled = false;
        btnSub.textContent = 'Login as Admin';
      }
    });
  </script>
</body>
</html>
