<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Signup — Sophía Study</title>
  <meta name="description" content="Register a new administrator account with an admin key." />
  <link rel="stylesheet" href="/css/sophia.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    body { min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
    .auth-panel { display:flex; flex-direction:column; justify-content:center; padding:3rem 4rem; position:relative; overflow-y:auto; }
    .auth-back { position:absolute; top:2rem; left:2rem; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); text-decoration:none; }
    .auth-back:hover { color:var(--text); }
    .auth-topbar { position:absolute; top:2rem; right:2rem; }
    .admin-tag { display:inline-flex; align-items:center; gap:0.5rem; padding:0.25rem 0.75rem; border:2px solid var(--primary-yellow); color:var(--primary-yellow); font-family:'Archivo Black',sans-serif; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:1rem; }
    .auth-header h1 { font-size:2.2rem; text-transform:uppercase; }
    .auth-header p  { color:var(--text-muted); margin-top:0.4rem; font-size:0.9rem; }
    .auth-form { display:flex; flex-direction:column; gap:1.1rem; max-width:400px; }
    .auth-footer { margin-top:1.5rem; font-size:0.875rem; color:var(--text-muted); }
    .auth-footer a { color:var(--primary-yellow); font-weight:600; }
    .key-field-wrap { position:relative; }
    .key-field-wrap .form-input { padding-right: 2.5rem; }
    .key-toggle { position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.9rem; }
    .auth-art { background:#111; position:relative; overflow:hidden; }
    .auth-quote { position:absolute; bottom:3rem; left:2rem; right:2rem; z-index:2; }
    .auth-quote blockquote { font-family:'Archivo Black',sans-serif; font-size:1.3rem; color:var(--primary-yellow); line-height:1.2; text-transform:uppercase; }
    .auth-quote cite { display:block; margin-top:0.5rem; font-size:0.75rem; color:rgba(255,255,255,0.4); font-style:normal; text-transform:uppercase; letter-spacing:0.1em; }
    @media (max-width:800px) { body{grid-template-columns:1fr;} .auth-art{display:none;} .auth-panel{padding:5rem 1.5rem 2rem;} }
  </style>
</head>
<body>

  <div class="auth-panel">
    <a href="/admin/login.html" class="auth-back">← Admin Login</a>
    <div class="auth-topbar">
      <button class="theme-toggle" aria-label="Toggle theme">☀️</button>
    </div>

    <div class="auth-header" style="margin-bottom:2rem;">
      <div class="admin-tag">
        <span style="width:8px;height:8px;background:var(--primary-yellow);display:inline-block;"></span>
        Admin Registration
      </div>
      <h1>Create Admin</h1>
      <p>Requires a valid admin key. Invalid key = rejected entirely.</p>
    </div>

    <div id="auth-error"   class="alert alert-error"   style="display:none;"></div>
    <div id="auth-success" class="alert alert-success" style="display:none;"></div>

    <form class="auth-form" id="signup-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input class="form-input" type="text" id="name" placeholder="Admin Name"
               autocomplete="name" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" placeholder="adminuser"
               pattern="^[a-zA-Z0-9_]+" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="admin@org.com"
               autocomplete="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Min. 6 characters"
               autocomplete="new-password" minlength="6" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="admin-key">Admin Key</label>
        <div class="key-field-wrap">
          <input class="form-input" type="password" id="admin-key" placeholder="Enter admin key"
                 autocomplete="off" required />
          <button type="button" class="key-toggle" id="key-toggle" aria-label="Show/hide key">👁</button>
        </div>
        <span class="form-hint">This key is set by your system administrator.</span>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" id="btn-submit">
        Register Admin Account
      </button>
    </form>

    <p class="auth-footer">
      Already have admin account? <a href="/admin/login.html">Login →</a>
    </p>
  </div>

  <div class="auth-art" aria-hidden="true">
    <svg viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;position:absolute;inset:0">
      <rect width="500" height="600" fill="#111"/>
      <circle cx="250" cy="250" r="200" fill="var(--primary-yellow)" opacity="0.08"/>
      <circle cx="250" cy="250" r="140" fill="var(--primary-yellow)" opacity="0.1"/>
      <circle cx="250" cy="250" r="80"  fill="var(--primary-yellow)" opacity="0.15"/>
      <rect x="0" y="0" width="500" height="4" fill="var(--primary-yellow)"/>
      <rect x="0" y="596" width="500" height="4" fill="var(--primary-yellow)"/>
      <rect x="0" y="0" width="4" height="600" fill="var(--primary-yellow)"/>
      <rect x="496" y="0" width="4" height="600" fill="var(--primary-yellow)"/>
      <polygon points="250,100 350,280 150,280" fill="var(--primary-yellow)" opacity="0.6"/>
    </svg>
    <div class="auth-quote">
      <blockquote>"The ultimate aim of all creative activity is building."</blockquote>
      <cite>— Walter Gropius</cite>
    </div>
  </div>

  <script type="module">
    import { initTheme } from '/js/theme.js';
    import { api } from '/js/api.js';

    initTheme();

    // Show/hide admin key
    document.getElementById('key-toggle').addEventListener('click', () => {
      const inp = document.getElementById('admin-key');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    const form   = document.getElementById('signup-form');
    const errBox = document.getElementById('auth-error');
    const sucBox = document.getElementById('auth-success');
    const btnSub = document.getElementById('btn-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.style.display = 'none';
      sucBox.style.display = 'none';
      btnSub.disabled = true;
      btnSub.textContent = 'Creating admin account…';

      const body = {
        name:      document.getElementById('name').value.trim(),
        username:  document.getElementById('username').value.trim(),
        email:     document.getElementById('email').value.trim(),
        password:  document.getElementById('password').value,
        admin_key: document.getElementById('admin-key').value,
      };

      try {
        await api.post('/auth/signup/admin', body);
        sucBox.textContent = 'Admin account created! Redirecting to login…';
        sucBox.style.display = 'block';
        setTimeout(() => { window.location.href = '/admin/login.html'; }, 1500);
      } catch (err) {
        errBox.textContent = err.message || 'Registration failed. Check your admin key.';
        errBox.style.display = 'block';
        btnSub.disabled = false;
        btnSub.textContent = 'Register Admin Account';
      }
    });
  </script>
</body>
</html>
